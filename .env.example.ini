# ODPT API Configuration
ODPT_API_KEY=your_odpt_api_key_here

# Email Configuration (Gmail SMTP)
SMTP_SERVER=smtp.gmail.com
SMTP_PORT=587
EMAIL_SENDER=your_email@gmail.com
EMAIL_PASSWORD=your_app_password_or_regular_password
EMAIL_RECIPIENT=recipient@example.com

# Check interval in minutes (e.g., 5 or 10)
CHECK_INTERVAL=5

# Optional: Use SQLite for alert history (True/False)
USE_SQLITE=True